<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica_1 - DOM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="tarjeta">
        <h3>Generador de Saludos</h3>
        <input type="text" id="nombreUsuario" placeholder="Ingrese su nombre">
        <button id="btnSaludar">Saludar</button>
        <p id="mensaje" style="color: rgb(255, 0, 0);"></p>
    </div>

    <div class="tarjeta">
        <h3>Ejercicio de Suscripcion</h3>
        <form id="formularioSuscripcion">
            <label for="email">Correo Electronico:</label>
            <input type="email" id="email" placeholder="Correo electronico" required>
            <button id="btnSuscribirse">Suscribirme</button>
        </form>

        <p id="mensajeEnviado" style="color: blue;"></p>
    </div>
    
    <script src="scripts.js"></script>
</body>
</html>
